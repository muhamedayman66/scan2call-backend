databases:
  - name: scan2call-db
    databaseName: scan2call
    user: scan2call
    plan: free

services:
  - type: web
    name: scan2call-backend
    env: python
    buildCommand: "bash build.sh"
    startCommand: "daphne scan2call_project.asgi:application --port $PORT --bind 0.0.0.0"
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: scan2call-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://your-frontend-domain.com"
      - key: PYTHON_VERSION
        value: 3.10.0
